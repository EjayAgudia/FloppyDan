<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Floppy Dan</title>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: 'Lilita One', cursive;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      touch-action: none;
    }

    #gameContainer {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      aspect-ratio: 400 / 600;
      margin: auto;
      background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
      box-shadow: 0 0 30px rgba(0,242,254,0.4);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #loadingScreen h1 {
      color: white;
      font-family: Arial, sans-serif;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      margin-bottom: 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #score {
      position: absolute;
      top: 5%;
      left: 5%;
      font-size: clamp(32px, 6vw, 48px);
      color: white;
      font-weight: normal;
      text-shadow: 
        -2px -2px 0 #555,
         2px -2px 0 #555,
        -2px  2px 0 #555,
         2px  2px 0 #555,
         4px  4px 0 rgba(0,0,0,0.5);
      z-index: 10;
      letter-spacing: 2px;
    }

    #restartBtn {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 40px;
      font-size: clamp(24px, 5vw, 32px);
      background: linear-gradient(180deg, #ff9800 0%, #f57c00 100%);
      color: white;
      border: 4px solid white;
      border-radius: 15px;
      box-shadow: 0 6px 0 #e65100, 0 10px 15px rgba(0,0,0,0.4);
      display: none;
      cursor: pointer;
      font-family: 'Lilita One', cursive;
      letter-spacing: 1px;
      z-index: 30;
      text-transform: uppercase;
      transition: all 0.1s ease;
    }

    #restartBtn:active {
      transform: translate(-50%, -46%);
      box-shadow: 0 2px 0 #e65100, 0 5px 5px rgba(0,0,0,0.4);
    }

    #gameOverText {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: clamp(40px, 8vw, 64px);
      text-shadow: 
        -3px -3px 0 #d32f2f,
         3px -3px 0 #d32f2f,
        -3px  3px 0 #d32f2f,
         3px  3px 0 #d32f2f,
         6px  6px 0 rgba(0,0,0,0.6);
      z-index: 20;
      text-align: center;
      display: none;
      width: 100%;
    }

    #highScoreDisplay {
      position: absolute;
      top: 5%;
      right: 5%;
      font-size: clamp(20px, 4vw, 32px);
      color: gold;
      font-weight: normal;
      text-shadow: 
        -2px -2px 0 #b8860b,
         2px -2px 0 #b8860b,
        -2px  2px 0 #b8860b,
         2px  2px 0 #b8860b,
         4px  4px 0 rgba(0,0,0,0.5);
      z-index: 10;
      letter-spacing: 1px;
      text-align: right;
    }

    #shareBtn {
      position: absolute;
      top: 72%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 30px;
      font-size: clamp(18px, 4vw, 24px);
      background: linear-gradient(180deg, #2196F3 0%, #1976D2 100%);
      color: white;
      border: 3px solid white;
      border-radius: 12px;
      box-shadow: 0 5px 0 #0d47a1, 0 8px 10px rgba(0,0,0,0.4);
      display: none;
      cursor: pointer;
      font-family: 'Lilita One', cursive;
      letter-spacing: 1px;
      z-index: 30;
      text-transform: uppercase;
      transition: all 0.1s ease;
    }

    #shareBtn:active {
      transform: translate(-50%, -46%);
      box-shadow: 0 2px 0 #0d47a1, 0 4px 4px rgba(0,0,0,0.4);
    }
  </style>
</head>

<body>

  <div id="loadingScreen">
    <h1>Floppy Dan</h1>
    <div class="spinner"></div>
  </div>

  <div id="gameContainer">
    <div id="score">0</div>
    <div id="highScoreDisplay">BEST: 0</div>
    <div id="gameOverText">GAME OVER</div>
    <button id="restartBtn">RESTART</button>
    <button id="shareBtn">SHARE</button>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let bird, pipes, score, gameOver, frames;
    let highScore = localStorage.getItem("floppyHighScore") || 0;

    const restartBtn = document.getElementById("restartBtn");
    const shareBtn = document.getElementById("shareBtn");
    const highScoreDisplay = document.getElementById("highScoreDisplay");

    // Load images
    const birdImg = new Image();
    // ---> CHANGE YOUR IMAGE DIRECTORY/FILENAME HERE <---
    birdImg.src = "bird.png";

    // Wait until image is loaded before starting the game
    let gameStarted = false;
    birdImg.onload = () => {
      if (!gameStarted) {
        gameStarted = true;
        setTimeout(() => {
          document.getElementById("loadingScreen").style.display = "none";
          startGame();
        }, 2000);
      }
    };

    let firstRound = true;

    function startGame() {
      init();
      loop();
    }

    function init() {
      document.getElementById("gameOverText").style.display = "none";
      bird = {
        x: 50,
        y: 150,
        width: 40,   // adjust to your image size
        height: 40,  // adjust to your image size
        gravity: 0.6,
        lift: -9,
        velocity: 0
      };

      pipes = [];
      score = 0;
      gameOver = false;
      frames = 0;

      highScoreDisplay.innerText = "BEST: " + highScore;
      document.getElementById("score").innerText = "0";
      restartBtn.style.display = "none";
      shareBtn.style.display = "none";
    }

    // Bird controls
    const jump = () => {
      if (!gameOver) bird.velocity = bird.lift;
    };

    document.addEventListener("keydown", jump);
    document.addEventListener("touchstart", (e) => {
      if (e.target.tagName !== "INPUT" && e.target.tagName !== "BUTTON" && e.target.tagName !== "LABEL") {
        e.preventDefault();
        jump();
      }
    }, { passive: false });

    restartBtn.addEventListener("click", init);

    shareBtn.addEventListener("click", () => {
      const shareText = `I just scored ${score} points in Floppy Dan! Can you beat my high score?`;
      
      const fallbackShare = () => {
        const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`;
        window.open(twitterUrl, '_blank');
      };

      if (navigator.share) {
        navigator.share({
          title: 'Floppy Dan',
          text: shareText
        }).catch(err => {
          console.log('Native share failed, using fallback.', err);
          fallbackShare();
        });
      } else {
        fallbackShare();
      }
    });

    function triggerGameOver() {
      gameOver = true;
      document.getElementById("gameOverText").style.display = "block";
      restartBtn.style.display = "block";
      shareBtn.style.display = "block";
      
      if (score > highScore) {
        highScore = score;
        localStorage.setItem("floppyHighScore", highScore);
        highScoreDisplay.innerText = "BEST: " + highScore;
      }
    }

    function createPipe() {
      const gap = 130;
      const topHeight = Math.random() * 300 + 50;

      pipes.push({
        x: canvas.width,
        top: topHeight,
        bottom: canvas.height - topHeight - gap,
        width: 50
      });
    }

    function update() {
      if (gameOver) return;

      bird.velocity += bird.gravity;
      bird.y += bird.velocity;

      if (bird.y + bird.height > canvas.height || bird.y < 0) {
        triggerGameOver();
      }

      if (frames % 90 === 0) createPipe();

      pipes.forEach((pipe, index) => {
        pipe.x -= 2;

        if (
          bird.x < pipe.x + pipe.width &&
          bird.x + bird.width > pipe.x &&
          (bird.y < pipe.top || bird.y + bird.height > canvas.height - pipe.bottom)
        ) {
          triggerGameOver();
        }

        if (pipe.x + pipe.width === bird.x) {
          score++;
          document.getElementById("score").innerText = score;
        }

        if (pipe.x + pipe.width < 0) pipes.splice(index, 1);
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw bird
      ctx.drawImage(birdImg, bird.x, bird.y, bird.width, bird.height);

      // Draw pipes
      pipes.forEach(pipe => {
        const capHeight = 20;
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#000";

        const drawPipePart = (x, y, w, h) => {
          let grad = ctx.createLinearGradient(x, 0, x + w, 0);
          grad.addColorStop(0, "#73bf2e");
          grad.addColorStop(0.1, "#9de659");
          grad.addColorStop(0.3, "#73bf2e");
          grad.addColorStop(1, "#558022");
          ctx.fillStyle = grad;
          ctx.fillRect(x, y, w, h);
          ctx.strokeRect(x, y, w, h);
        };

        // Top pipe body
        drawPipePart(pipe.x + 2, 0, pipe.width - 4, pipe.top - capHeight);
        // Top pipe cap
        drawPipePart(pipe.x, pipe.top - capHeight, pipe.width, capHeight);

        // Bottom pipe body
        drawPipePart(pipe.x + 2, canvas.height - pipe.bottom + capHeight, pipe.width - 4, pipe.bottom - capHeight);
        // Bottom pipe cap
        drawPipePart(pipe.x, canvas.height - pipe.bottom, pipe.width, capHeight);
      });

    }

    function loop() {
      update();
      draw();
      frames++;
      requestAnimationFrame(loop);
    }
  </script>

</body>

</html>
