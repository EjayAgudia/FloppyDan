<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Floppy Dan</title>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: 'Lilita One', cursive;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      touch-action: none;
    }

    #gameContainer {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      aspect-ratio: 400 / 600;
      margin: auto;
      background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
      box-shadow: 0 0 30px rgba(0,242,254,0.4);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #loadingScreen h1 {
      color: white;
      font-family: Arial, sans-serif;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      margin-bottom: 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #score {
      position: absolute;
      top: 5%;
      left: 5%;
      font-size: clamp(32px, 6vw, 48px);
      color: white;
      font-weight: normal;
      text-shadow: 
        -2px -2px 0 #555,
         2px -2px 0 #555,
        -2px  2px 0 #555,
         2px  2px 0 #555,
         4px  4px 0 rgba(0,0,0,0.5);
      z-index: 10;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      text-align: center;
      width: max-content;
    }

    #restartBtn {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 40px;
      font-size: clamp(24px, 5vw, 32px);
      background: linear-gradient(180deg, #ff9800 0%, #f57c00 100%);
      color: white;
      border: 4px solid white;
      border-radius: 15px;
      box-shadow: 0 6px 0 #e65100, 0 10px 15px rgba(0,0,0,0.4);
      display: none;
      cursor: pointer;
      font-family: 'Lilita One', cursive;
      letter-spacing: 1px;
      z-index: 30;
      text-transform: uppercase;
      transition: all 0.1s ease;
    }

    #restartBtn:active {
      transform: translate(-50%, -46%);
      box-shadow: 0 2px 0 #e65100, 0 5px 5px rgba(0,0,0,0.4);
    }

    #gameOverText {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: clamp(40px, 8vw, 64px);
      text-shadow: 
        -3px -3px 0 #d32f2f,
         3px -3px 0 #d32f2f,
        -3px  3px 0 #d32f2f,
         3px  3px 0 #d32f2f,
         6px  6px 0 rgba(0,0,0,0.6);
      z-index: 20;
      text-align: center;
      display: none;
      width: 100%;
    }

    /* Settings Menu CSS */
    #settingsBtn {
      position: absolute;
      top: 5%;
      right: 5%;
      font-size: clamp(24px, 5vw, 36px);
      background: none;
      border: none;
      color: white;
      text-shadow: 2px 2px 0 #555;
      z-index: 40;
      cursor: pointer;
      transition: transform 0.2s;
      padding: 5px;
    }

    #settingsBtn:hover {
      transform: scale(1.1) rotate(15deg);
    }

    #settingsMenu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      display: none;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
    }

    .settings-content {
      background: linear-gradient(180deg, #ff9800 0%, #f57c00 100%);
      padding: 30px;
      border-radius: 20px;
      border: 4px solid white;
      text-align: center;
      color: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      font-family: 'Lilita One', cursive;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 12px;
      font-size: 20px;
      text-shadow: 1px 1px 0 #e65100;
    }

    .settings-content {
      background: linear-gradient(180deg, #ff9800 0%, #f57c00 100%);
      padding: 20px 30px;
      border-radius: 20px;
      border: 4px solid white;
      text-align: center;
      color: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      font-family: 'Lilita One', cursive;
      max-height: 85vh;
      overflow-y: auto;
      min-width: 300px;
    }

    .settings-content h2 {
      margin: 0 0 15px 0;
      font-size: 32px;
      text-shadow: 2px 2px 0 #e65100;
      letter-spacing: 2px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
    }

    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 28px;
      border: 2px solid white;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 4px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #4CAF50;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    #closeSettingsBtn {
      padding: 10px 25px;
      font-size: 20px;
      background: #d32f2f;
      color: white;
      border: 3px solid white;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Lilita One', cursive;
      box-shadow: 0 4px 0 #b71c1c;
      transition: all 0.1s;
    }

    #closeSettingsBtn:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    #highScoreDisplay {
      position: absolute;
      top: 13%;
      right: 5%;
      font-size: clamp(20px, 4vw, 32px);
      color: gold;
      font-weight: normal;
      text-shadow: 
        -2px -2px 0 #b8860b,
         2px -2px 0 #b8860b,
        -2px  2px 0 #b8860b,
         2px  2px 0 #b8860b,
         4px  4px 0 rgba(0,0,0,0.5);
      z-index: 10;
      letter-spacing: 1px;
      text-align: right;
    }

    #shareBtn {
      position: absolute;
      top: 72%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 30px;
      font-size: clamp(18px, 4vw, 24px);
      background: linear-gradient(180deg, #2196F3 0%, #1976D2 100%);
      color: white;
      border: 3px solid white;
      border-radius: 12px;
      box-shadow: 0 5px 0 #0d47a1, 0 8px 10px rgba(0,0,0,0.4);
      display: none;
      cursor: pointer;
      font-family: 'Lilita One', cursive;
      letter-spacing: 1px;
      z-index: 30;
      text-transform: uppercase;
      transition: all 0.1s ease;
    }

    #shareBtn:active {
      transform: translate(-50%, -46%);
      box-shadow: 0 2px 0 #0d47a1, 0 4px 4px rgba(0,0,0,0.4);
    }
  </style>
</head>

<body>

  <div id="loadingScreen">
    <h1>Floppy Dan</h1>
    <div class="spinner"></div>
  </div>

  <div id="gameContainer">
    <button id="settingsBtn">⚙️</button>
    <div id="settingsMenu">
      <div class="settings-content">
        <h2>SETTINGS</h2>
        <div class="setting-row">
          <span>SOUND F/X</span>
          <label class="switch"><input type="checkbox" id="soundToggle" checked><span class="slider"></span></label>
        </div>
        <div class="setting-row">
          <span>NIGHT MODE</span>
          <label class="switch"><input type="checkbox" id="themeToggle"><span class="slider"></span></label>
        </div>
        <div class="setting-row">
          <span>SHOW FPS</span>
          <label class="switch"><input type="checkbox" id="fpsToggle"><span class="slider"></span></label>
        </div>
        <div class="setting-row">
          <span>GRAVITY INVERT</span>
          <label class="switch"><input type="checkbox" id="gravityToggle"><span class="slider"></span></label>
        </div>
        <div class="setting-row">
          <span>ALLOW DASH</span>
          <label class="switch"><input type="checkbox" id="dashToggle" checked><span class="slider"></span></label>
        </div>
        <div class="setting-row">
          <span>MOVING PIPES</span>
          <label class="switch"><input type="checkbox" id="movingPipesToggle" checked><span class="slider"></span></label>
        </div>
        <div class="setting-row" style="margin-bottom: 20px;">
          <span>DIFFICULTY</span>
          <select id="diffSelect" style="font-family: inherit; font-size: 16px; padding: 4px; border-radius: 8px; border: 2px solid white; background: #ff9800; color: white;">
            <option value="easy">EASY</option>
            <option value="normal" selected>NORMAL</option>
            <option value="hard">HARD</option>
          </select>
        </div>
        <button id="closeSettingsBtn">DONE</button>
      </div>
    </div>
    <div id="score">0</div>
    <div id="highScoreDisplay">BEST: 0</div>
    <div id="gameOverText">GAME OVER</div>
    <button id="restartBtn">RESTART</button>
    <button id="shareBtn">SHARE</button>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let bird, pipes, score, gameOver, frames;
    let highScore = localStorage.getItem("floppyHighScore") || 0;
    let isPaused = false;

    // Sound Setup
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    let cfg = {
      sound: localStorage.getItem("floppySound") !== "false",
      theme: localStorage.getItem("fd_theme") === "true",
      fps: localStorage.getItem("fd_fps") === "true",
      gravity: localStorage.getItem("fd_gravity") === "true",
      dash: localStorage.getItem("fd_dash") !== "false",
      movingPipes: localStorage.getItem("fd_movingPipes") !== "false",
      diff: localStorage.getItem("fd_diff") || "normal"
    };

    function applyTheme() {
      const gC = document.getElementById("gameContainer");
      if (cfg.theme) {
        gC.style.background = "linear-gradient(180deg, #1a1a2e 0%, #16213e 100%)";
        gC.style.boxShadow = "0 0 30px rgba(22, 33, 62, 0.6)";
      } else {
        gC.style.background = "linear-gradient(180deg, #4facfe 0%, #00f2fe 100%)";
        gC.style.boxShadow = "0 0 30px rgba(0,242,254,0.4)";
      }
    }
    applyTheme();

    function initAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(freq, type, duration, vol, sweepFreq) {
      if (!cfg.sound) return;
      initAudio();
      
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      if (sweepFreq) {
          osc.frequency.exponentialRampToValueAtTime(sweepFreq, audioCtx.currentTime + duration);
      }
      
      gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playFlapSound() { playTone(300, 'sine', 0.15, 0.5, 600); }
    function playScoreSound() { 
      playTone(800, 'square', 0.1, 0.1, 1200); 
      setTimeout(() => playTone(1200, 'square', 0.1, 0.1, 1600), 100); 
    }
    function playDieSound() { playTone(400, 'sawtooth', 0.4, 0.5, 50); }

    const restartBtn = document.getElementById("restartBtn");
    const shareBtn = document.getElementById("shareBtn");
    const highScoreDisplay = document.getElementById("highScoreDisplay");

    // Load images
    const birdImg = new Image();
    // ---> CHANGE YOUR IMAGE DIRECTORY/FILENAME HERE <---
    birdImg.src = "bird.png";

    // Wait until image is loaded before starting the game
    let gameStarted = false;
    birdImg.onload = () => {
      if (!gameStarted) {
        gameStarted = true;
        setTimeout(() => {
          document.getElementById("loadingScreen").style.display = "none";
          startGame();
        }, 2000);
      }
    };

    let firstRound = true;

    let lastTime = 0;
    let accumulatedTime = 0;
    const timeStep = 1000 / 60;
    
    let fpsFrames = 0;
    let fpsLastUpdate = 0;
    let currentFps = 0;

    function startGame() {
      init();
      lastTime = performance.now();
      accumulatedTime = 0;
      requestAnimationFrame(loop);
    }

    let stars = [];
    let dashActive = 0;
    let dashCooldown = 0;

    function init() {
      document.getElementById("gameOverText").style.display = "none";
      const scoreEl = document.getElementById("score");
      scoreEl.style.top = "5%";
      scoreEl.style.left = "5%";
      scoreEl.style.transform = "none";
      scoreEl.style.fontSize = "clamp(32px, 6vw, 48px)";

      stars = [];
      dashActive = 0;
      dashCooldown = 0;
      
      let initialY = cfg.gravity ? canvas.height - 150 : 150;
      let grav = cfg.gravity ? -0.6 : 0.6;
      let lift = cfg.gravity ? 9 : -9;

      bird = {
        x: 50,
        y: initialY,
        width: 40,   // adjust to your image size
        height: 40,  // adjust to your image size
        gravity: grav,
        lift: lift,
        velocity: 0
      };

      pipes = [];
      score = 0;
      gameOver = false;
      frames = 0;

      highScoreDisplay.innerText = "BEST: " + highScore;
      scoreEl.innerText = "0";
      restartBtn.style.display = "none";
      shareBtn.style.display = "none";
    }

    // Bird controls
    const jump = () => {
      if (!gameOver && !isPaused) {
        if (cfg.gravity) bird.gravity = -bird.gravity;
        else bird.velocity = bird.lift;
        playFlapSound();
      }
    };

    function triggerDash() {
      if (cfg.dash && !gameOver && !isPaused && dashCooldown <= 0) {
        dashActive = 30;
        dashCooldown = 180;
        playTone(500, 'sawtooth', 0.3, 0.4, 1500); 
      }
    }

    let touchStartX = null;
    document.addEventListener("touchstart", (e) => {
      if (e.target.tagName !== "INPUT" && e.target.tagName !== "BUTTON" && e.target.tagName !== "LABEL" && e.target.closest("#settingsMenu") === null) {
        e.preventDefault();
        touchStartX = e.changedTouches[0].screenX;
      }
    }, { passive: false });
    
    document.addEventListener("touchend", (e) => {
      if (touchStartX !== null && !isPaused && !gameOver) {
         let touchEndX = e.changedTouches[0].screenX;
         if (touchEndX - touchStartX > 50) triggerDash();
         else jump();
         touchStartX = null;
      }
    });

    document.addEventListener("keydown", (e) => {
      if (isPaused) return;
      if (e.key === "Shift" || e.key === "ArrowRight") triggerDash();
      else if (e.key === " " || e.key === "ArrowUp") jump();
    });

    restartBtn.addEventListener("click", init);

    const settingsBtn = document.getElementById("settingsBtn");
    const settingsMenu = document.getElementById("settingsMenu");
    const closeSettingsBtn = document.getElementById("closeSettingsBtn");
    const soundToggle = document.getElementById("soundToggle");
    const themeToggle = document.getElementById("themeToggle");
    const fpsToggle = document.getElementById("fpsToggle");
    const gravityToggle = document.getElementById("gravityToggle");
    const dashToggle = document.getElementById("dashToggle");
    const movingPipesToggle = document.getElementById("movingPipesToggle");
    const diffSelect = document.getElementById("diffSelect");
    
    soundToggle.checked = cfg.sound;
    themeToggle.checked = cfg.theme;
    fpsToggle.checked = cfg.fps;
    gravityToggle.checked = cfg.gravity;
    dashToggle.checked = cfg.dash;
    movingPipesToggle.checked = cfg.movingPipes;
    diffSelect.value = cfg.diff;

    settingsBtn.addEventListener("click", () => {
      isPaused = true;
      settingsMenu.style.display = "flex";
      initAudio();
    });

    closeSettingsBtn.addEventListener("click", () => {
      isPaused = false;
      lastTime = performance.now(); // reset delta time accumulator
      settingsMenu.style.display = "none";
    });

    soundToggle.addEventListener("change", (e) => {
      cfg.sound = e.target.checked;
      localStorage.setItem("floppySound", cfg.sound);
      if (cfg.sound) initAudio();
    });
    
    themeToggle.addEventListener("change", e => { cfg.theme = e.target.checked; localStorage.setItem("fd_theme", cfg.theme); applyTheme(); });
    fpsToggle.addEventListener("change", e => { cfg.fps = e.target.checked; localStorage.setItem("fd_fps", cfg.fps); });
    gravityToggle.addEventListener("change", e => { cfg.gravity = e.target.checked; localStorage.setItem("fd_gravity", cfg.gravity); });
    dashToggle.addEventListener("change", e => { cfg.dash = e.target.checked; localStorage.setItem("fd_dash", cfg.dash); });
    movingPipesToggle.addEventListener("change", e => { cfg.movingPipes = e.target.checked; localStorage.setItem("fd_movingPipes", cfg.movingPipes); });
    diffSelect.addEventListener("change", e => { cfg.diff = e.target.value; localStorage.setItem("fd_diff", cfg.diff); });

    shareBtn.addEventListener("click", () => {
      const shareText = `I just scored ${score} points in Floppy Dan! Can you beat my high score?`;
      
      const fallbackShare = () => {
        const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`;
        window.open(twitterUrl, '_blank');
      };

      if (navigator.share) {
        navigator.share({
          title: 'Floppy Dan',
          text: shareText
        }).catch(err => {
          console.log('Native share failed, using fallback.', err);
          fallbackShare();
        });
      } else {
        fallbackShare();
      }
    });

    function triggerGameOver() {
      if (gameOver) return;
      playDieSound();
      gameOver = true;
      document.getElementById("gameOverText").style.display = "block";
      restartBtn.style.display = "block";
      shareBtn.style.display = "block";
      
      const scoreEl = document.getElementById("score");
      scoreEl.style.top = "48%";
      scoreEl.style.left = "50%";
      scoreEl.style.transform = "translate(-50%, -50%)";
      scoreEl.style.fontSize = "clamp(40px, 8vw, 64px)";
      scoreEl.innerText = "SCORE: " + score;

      if (score > highScore) {
        highScore = score;
        localStorage.setItem("floppyHighScore", highScore);
        highScoreDisplay.innerText = "BEST: " + highScore;
      }
    }

    function getDifficultyConfig() {
      let gap = 130; let freq = 90; let speed = 2;
      if (cfg.diff === "easy") { gap = 160; freq = 110; speed = 1.5; }
      else if (cfg.diff === "hard") { gap = 100; freq = 75; speed = 3.5; }
      return { gap, freq, speed };
    }

    function createPipe() {
      const { gap } = getDifficultyConfig();
      const topHeight = Math.random() * 300 + 50;

      pipes.push({
        x: canvas.width,
        top: topHeight,
        bottom: canvas.height - topHeight - gap,
        width: 50,
        moving: cfg.movingPipes && Math.random() < 0.3,
        yOffset: 0,
        yStartOffset: Math.random() * Math.PI * 2,
        scored: false
      });
      
      if (Math.random() < 0.3) {
         stars.push({ x: canvas.width + 50, y: topHeight + gap / 2, width: 25, height: 25 });
      }
    }

    function update() {
      if (gameOver) return;

      let { speed, freq } = getDifficultyConfig();
      if (dashActive > 0) {
         speed += 4;
         dashActive--;
      }
      if (dashCooldown > 0) dashCooldown--;

      bird.velocity += bird.gravity;
      bird.y += bird.velocity;

      if (bird.y + bird.height > canvas.height || bird.y < 0) {
        triggerGameOver();
      }

      if (frames % freq === 0) createPipe();

      stars.forEach((star, index) => {
         star.x -= speed;
         if (bird.x < star.x + star.width && star.x < bird.x + bird.width &&
             bird.y < star.y + star.height && star.y < bird.y + bird.height) {
             score += 5;
             document.getElementById("score").innerText = score;
             stars.splice(index, 1);
             playTone(600, 'sine', 0.1, 0.5, 900);
             setTimeout(()=>playTone(900, 'sine', 0.1, 0.5, 1200), 100);
         }
      });
      stars = stars.filter(s => s.x + s.width > -50);

      pipes.forEach((pipe, index) => {
        pipe.x -= speed;
        
        if (pipe.moving) pipe.yOffset = Math.sin(frames * 0.05 + pipe.yStartOffset) * 50;

        let actualTop = pipe.top + pipe.yOffset;
        let actualBottom = pipe.bottom - pipe.yOffset;

        if (
          pipe.width > 0 &&
          bird.x < pipe.x + pipe.width &&
          bird.x + bird.width > pipe.x &&
          (bird.y < actualTop || bird.y + bird.height > canvas.height - actualBottom)
        ) {
          if (dashActive <= 0) triggerGameOver();
          else { pipe.width = 0; playTone(300, 'square', 0.2, 0.5, 100); } // smash
        }

        if (!pipe.scored && pipe.width > 0 && pipe.x + pipe.width < bird.x) {
          pipe.scored = true;
          score++;
          document.getElementById("score").innerText = score;
          playScoreSound();
        }

        if (pipe.x + 50 < 0) pipes.splice(index, 1);
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw bird (with dash ghost)
      if (dashActive > 0) {
         ctx.save();
         ctx.globalAlpha = 0.5;
         ctx.drawImage(birdImg, bird.x - 20, bird.y, bird.width, bird.height);
         ctx.globalAlpha = 0.3;
         ctx.drawImage(birdImg, bird.x - 40, bird.y, bird.width, bird.height);
         ctx.restore();
      }
      ctx.drawImage(birdImg, bird.x, bird.y, bird.width, bird.height);

      stars.forEach(star => {
         ctx.fillStyle = "yellow";
         ctx.save();
         ctx.translate(star.x + star.width/2, star.y + star.height/2);
         ctx.rotate(frames * 0.1);
         // cute 4 point diamond drawing for star
         ctx.beginPath();
         ctx.moveTo(0, -star.height/2); ctx.lineTo(star.width/4, -star.height/8);
         ctx.lineTo(star.width/2, 0); ctx.lineTo(star.width/4, star.height/8);
         ctx.lineTo(0, star.height/2); ctx.lineTo(-star.width/4, star.height/8);
         ctx.lineTo(-star.width/2, 0); ctx.lineTo(-star.width/4, -star.height/8);
         ctx.fill();
         ctx.restore();
      });

      // Draw pipes
      pipes.forEach(pipe => {
        if (pipe.width <= 0) return;
        
        let actualTop = pipe.top + pipe.yOffset;
        let actualBottom = pipe.bottom - pipe.yOffset;

        const capHeight = 20;
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#000";

        const drawPipePart = (x, y, w, h) => {
          let grad = ctx.createLinearGradient(x, 0, x + w, 0);
          if (cfg.theme) {
            grad.addColorStop(0, "#be2edd");
            grad.addColorStop(0.1, "#e056fd");
            grad.addColorStop(0.3, "#be2edd");
            grad.addColorStop(1, "#686de0");
          } else {
            grad.addColorStop(0, "#73bf2e");
            grad.addColorStop(0.1, "#9de659");
            grad.addColorStop(0.3, "#73bf2e");
            grad.addColorStop(1, "#558022");
          }
          ctx.fillStyle = grad;
          ctx.fillRect(x, y, w, h);
          ctx.strokeRect(x, y, w, h);
        };

        drawPipePart(pipe.x + 2, 0, pipe.width - 4, actualTop - capHeight);
        drawPipePart(pipe.x, actualTop - capHeight, pipe.width, capHeight);
        drawPipePart(pipe.x + 2, canvas.height - actualBottom + capHeight, pipe.width - 4, actualBottom - capHeight);
        drawPipePart(pipe.x, canvas.height - actualBottom, pipe.width, capHeight);
      });
      
      if (dashCooldown > 0 && dashCooldown < 180) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        ctx.fillRect(10, canvas.height - 20, (1 - dashCooldown/180) * 100, 10);
      } else if (cfg.dash && !gameOver && dashCooldown === 0) {
        ctx.fillStyle = "rgba(0, 255, 255, 0.8)";
        ctx.fillRect(10, canvas.height - 20, 100, 10);
      }

      if (cfg.fps) {
         ctx.fillStyle = "white";
         ctx.font = "16px monospace";
         ctx.fillText("FPS: " + Math.round(currentFps), 10, 25);
      }
    }

    function loop(timestamp = performance.now()) {
      requestAnimationFrame(loop);

      if (isPaused) {
        lastTime = timestamp;
        return;
      }

      const deltaTime = timestamp - lastTime;
      lastTime = timestamp;

      // If the delta time is massive (tab inactive), skip this frame's update
      if (deltaTime > 1000) {
        return;
      }

      accumulatedTime += deltaTime;

      // Update physics exactly at 60FPS
      while (accumulatedTime >= timeStep) {
        update();
        frames++;
        accumulatedTime -= timeStep;
      }

      // FPS Logic
      fpsFrames++;
      if (timestamp - fpsLastUpdate >= 1000) {
         currentFps = fpsFrames;
         fpsFrames = 0;
         fpsLastUpdate = timestamp;
      }

      // Draw as smoothly as system allows
      draw();
    }
  </script>
